<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spectrum Powered</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Montserrat', sans-serif;
      background: #fff;
    }

    .logo {
      width: 160px;
      margin-bottom: 1.5rem;
    }

    .brand {
      font-size: 3rem;
      font-weight: 400;
      color: #222;
      margin: 0;
      transition: font-size 0.4s ease;
    }

    .brand.animate {
      font-size: 3.5rem;
      font-weight: 700;
      background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00cc00, #0000ff, #8b00ff, #ff0000);
      background-size: 300% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: rainbowFlow 2.5s linear forwards;
    }

    @keyframes rainbowFlow {
      from { background-position: 0% center; }
      to   { background-position: 300% center; }
    }

    .coming-soon {
      font-size: 1.1rem;
      font-weight: 400;
      color: #888;
      margin: 0.6rem 0 0;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <img class="logo" src="images/logo.png" alt="Spectrum Powered">
  <h1 class="brand" id="brand">Spectrum Powered</h1>
  <p class="coming-soon">Coming Soon</p>

  <script>
    const brand = document.getElementById('brand');

    function triggerRainbow() {
      brand.classList.remove('animate');
      void brand.offsetWidth;
      brand.classList.add('animate');
    }

    brand.addEventListener('animationend', () => {
      brand.classList.remove('animate');
    });

    triggerRainbow();
    setInterval(triggerRainbow, 5000);
  </script>
</body>
</html>
